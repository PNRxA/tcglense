<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#e8833a">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCGLense</title>
    <!--
      Baseline SEO / social-preview tags. These are what crawlers that DON'T run
      JavaScript see (most social/link-unfurl bots). `usePageMeta` (src/lib/seo.ts)
      overrides them per-route at runtime for JS-capable crawlers (e.g. Googlebot)
      and the browser tab. Keep the values here in sync with SITE_DESCRIPTION.
    -->
    <meta
      name="description"
      content="Track trading-card prices over time, catalogue your collection, and follow your set-completion progress across games."
    >
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <meta property="og:site_name" content="TCGLense">
    <meta property="og:type" content="website">
    <meta property="og:title" content="TCGLense">
    <meta
      property="og:description"
      content="Track trading-card prices over time, catalogue your collection, and follow your set-completion progress across games."
    >
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="TCGLense">
    <meta
      name="twitter:description"
      content="Track trading-card prices over time, catalogue your collection, and follow your set-completion progress across games."
    >
    <!--
      Apply the saved theme before first paint to avoid a flash of the wrong theme.
      Keep this in sync with src/stores/theme.ts (STORAGE_KEY + resolution logic).
    -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('tcglense_theme')
          var theme = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system'
          var dark =
            theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
