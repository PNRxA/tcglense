<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#e8833a">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCGLense</title>
    <!--
      Baseline SEO / social-preview tags — the homepage defaults. Two things now
      supersede these per route: `usePageMeta` (src/lib/seo.ts) rewrites the live
      <head> at runtime for JS-capable clients (Googlebot, the browser tab), and the
      API's server-side prerenderer (api/src/handlers/prerender) serves a per-route
      head/body to known non-JS crawlers (the social/link unfurlers — Discord, Slack,
      Facebook, X, …). This baseline is the fallback for a UA not on the prerender list
      or when the renderer is unavailable. Keep the values here in sync with
      SITE_DESCRIPTION and DEFAULT_OG_IMAGE. The og:image/twitter:image path is
      rewritten to an absolute URL at build/serve time by the seoDiscoveryFiles plugin
      (vite.config.ts), since unfurlers that don't run JS need an absolute image URL.
    -->
    <meta
      name="description"
      content="Track trading-card prices over time, catalogue your collection and wish list, and use ghost mode to see exactly which cards you're missing."
    >
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <meta property="og:site_name" content="TCGLense">
    <meta property="og:type" content="website">
    <meta property="og:title" content="TCGLense">
    <meta
      property="og:description"
      content="Track trading-card prices over time, catalogue your collection and wish list, and use ghost mode to see exactly which cards you're missing."
    >
    <meta property="og:image" content="/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TCGLense">
    <meta
      name="twitter:description"
      content="Track trading-card prices over time, catalogue your collection and wish list, and use ghost mode to see exactly which cards you're missing."
    >
    <meta name="twitter:image" content="/og-image.png">
    <!--
      Apply the saved theme before first paint to avoid a flash of the wrong theme.
      Keep this in sync with src/stores/theme.ts (STORAGE_KEY + resolution logic).
    -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('tcglense_theme')
          var theme = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system'
          var dark =
            theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
