name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Formatting (cargo fmt + oxfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        working-directory: api
        run: cargo fmt --all -- --check

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      # Matches `npm run format` (oxfmt src/); generated ts-rs types are excluded
      # via web/.oxfmtrc.json's ignorePatterns.
      - name: Check web formatting
        working-directory: web
        run: npm run format:check

  backend-tests:
    name: Backend tests (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: Run tests
        run: cargo test --locked

      # `cargo test` above regenerated web/src/lib/api/generated from the Rust DTOs
      # (ts-rs); if the committed files no longer match, the API contract drifted.
      - name: Check generated web API types are in sync
        working-directory: .
        run: |
          if [ -n "$(git status --porcelain -- web/src/lib/api/generated)" ]; then
            echo "web/src/lib/api/generated is out of sync with the API's Rust DTOs." >&2
            echo "Run 'cargo test' in api/ and commit the regenerated files." >&2
            git status --porcelain -- web/src/lib/api/generated >&2
            git diff -- web/src/lib/api/generated >&2
            exit 1
          fi

  postgres-redis-tests:
    name: Postgres + Redis integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TCGLENSE_TEST_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/postgres
      TCGLENSE_TEST_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      # Runs ONLY the #[ignore] gated integration tests: the src/integration_pg.rs
      # Postgres suite and ratelimit.rs's Redis suite (the only ignored tests in the
      # crate); the env vars above point them at the service containers. The default
      # SQLite suite + the ts-rs drift check live in the untouched `backend-tests` job
      # (the ts-rs export only fires for the non-ignored DTO tests, which this job
      # doesn't run, so it stays owned there).
      - name: Run gated integration tests
        run: cargo test --locked -- --ignored

  web-unit-tests:
    name: Frontend unit tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit -- --run

  e2e-tests:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # --- Backend: built and run so the SPA talks to a real API serving the
      #     deterministic offline dummy catalog (no Scryfall network calls). ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: Build API
        working-directory: api
        run: cargo build --locked

      # --- Frontend ---
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps

      - name: Build web app
        working-directory: web
        run: npm run build

      # Start the API (offline dummy catalog), wait for it to be healthy, then
      # run Playwright. Playwright's own webServer config serves the built SPA
      # via `npm run preview` on :4173, which proxies /api to the API on :8080.
      # RATE_LIMIT_ENABLED=false: every browser request originates from the same
      # localhost IP, so the per-IP auth limiter (login is 10/min) throttles the
      # suite and flakes the UI sign-in flows with a 429. The limiter itself is
      # covered by the Rust security_tests; no e2e spec asserts on it.
      - name: Run Playwright tests
        working-directory: web
        env:
          CI: 'true'
        run: |
          set -euo pipefail

          JWT_SECRET=ci-not-a-real-secret-please-rotate-0123456789abcdef \
          SEED_DUMMY_DATA=true \
          SYNC_ON_STARTUP=false \
          RATE_LIMIT_ENABLED=false \
          SIGNUPS_ENABLED=true \
          ALLOW_INSECURE_DEV_AUTH=true \
          DATABASE_URL="sqlite://$RUNNER_TEMP/tcglense-ci.db?mode=rwc" \
          DATA_DIR="$RUNNER_TEMP/api-data" \
          HOST=127.0.0.1 \
          PORT=8080 \
          RUST_LOG=warn \
          ../api/target/debug/tcglense-api > "$RUNNER_TEMP/api.log" 2>&1 &
          API_PID=$!
          trap 'kill "$API_PID" 2>/dev/null || true' EXIT

          echo "Waiting for the API to become healthy..."
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/api/health >/dev/null; then
              echo "API is up."
              break
            fi
            if ! kill -0 "$API_PID" 2>/dev/null; then
              echo "API process exited early; log:" >&2
              cat "$RUNNER_TEMP/api.log" >&2
              exit 1
            fi
            if [ "$i" -eq 60 ]; then
              echo "API did not become healthy in time; log:" >&2
              cat "$RUNNER_TEMP/api.log" >&2
              exit 1
            fi
            sleep 1
          done

          npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Upload API log
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: api-log
          path: ${{ runner.temp }}/api.log
          retention-days: 7
