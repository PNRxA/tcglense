# TCGLense — homelab stack (Docker): the single "combined" image + SQLite.
#
# One container: the API serves both /api and the SPA (via WEB_ROOT), backed by an
# embedded SQLite database. Everything (DB + cached card images) persists in the
# tcglense_data volume. Nothing else to run — ideal for a homelab / single box.
#
# Bring it up:
#   export JWT_SECRET=$(openssl rand -hex 32)   # required
#   docker compose -f deploy/docker-compose.homelab.yml up -d
#   # then open http://<host>:8080
#
# For HTTPS, put a reverse proxy (your homelab's Caddy/Traefik/nginx, or a tunnel)
# in front and set COOKIE_SECURE=true + PUBLIC_SITE_URL to the external https URL.
# Pin a release with IMAGE_TAG=vX.Y.Z (defaults to :latest).
services:
  tcglense:
    image: ghcr.io/pnrxa/tcglense:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET, e.g. openssl rand -hex 32}
      # Planned upgrade switch; recreate the container after changing it.
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
      # Set true only when a TLS-terminating proxy sits in front (HTTPS refresh cookie).
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:8080}
      # Closed by default even on a LAN. To create accounts without a mail provider,
      # deliberately set BOTH flags true and keep the service on a trusted network.
      SIGNUPS_ENABLED: ${SIGNUPS_ENABLED:-false}
      ALLOW_INSECURE_DEV_AUTH: ${ALLOW_INSECURE_DEV_AUTH:-false}
      # Required before opening signups on a public HTTPS origin. Blank values keep
      # the service safely closed; EMAIL_FROM must use a Resend-verified domain.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      # On first boot the API imports MTG card data from Scryfall in the background.
      # Set SYNC_ON_STARTUP=false to skip, or SEED_DUMMY_DATA=true for an offline catalog.
      # SYNC_ON_STARTUP: "true"
    volumes:
      - tcglense_data:/data   # SQLite DB + cached card images

volumes:
  tcglense_data:
