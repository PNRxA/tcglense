# Local Postgres + Redis for optional-backend development and the gated integration
# tests (`cargo test -- --ignored` from api/). Not used by the default SQLite dev flow.
#
#   docker compose -f deploy/docker-compose.yml up -d
#   TCGLENSE_TEST_POSTGRES_URL=postgres://postgres:postgres@localhost:5432/postgres \
#   TCGLENSE_TEST_REDIS_URL=redis://localhost:6379 \
#   (cd api && cargo test -- --ignored)
#
# For running the API itself against Postgres:
#   ALLOW_INSECURE_DEV_SECRET=true \
#   DATABASE_URL=postgres://tcglense:tcglense@localhost:5432/tcglense \
#   REDIS_URL=redis://localhost:6379 cargo run   # (create the tcglense DB/role first,
#   or reuse the postgres superuser DB the tests carve isolated databases off)
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      # Loopback-only: this dev/test stack uses default superuser creds and an
      # unauthenticated Redis, so never publish them on all interfaces (on Linux
      # Docker's NAT rules bypass most host firewalls). Localhost is all the docs'
      # usage needs. Not a production path — the prod composes publish only Caddy.
      - "127.0.0.1:5432:5432"
    volumes:
      - tcglense_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    ports:
      # Loopback-only (see the postgres note above): unauthenticated Redis must not
      # be reachable from the LAN.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  tcglense_pgdata:
